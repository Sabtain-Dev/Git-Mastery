name: Advanced Practice Workflow

on: push

jobs:
  test-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Print Message
        run: echo "Workflow started!"

      - name: Show Date
        run: date

      - name: List Files
        run: ls

      - name: Run Python Script
        run: python script.py